<section class="classes-page rounded-5 p-3 p-md-4 p-xl-5">
  <header class="classes-hero rounded-4 p-4 p-md-5 mb-4">
    <p class="classes-eyebrow mb-2">Class Browsing</p>
    <h1 class="classes-title mb-2">Find your next workout</h1>
    <p class="classes-subtitle mb-0">Use search and difficulty filters to quickly discover sessions that match your pace.</p>
  </header>

  <section class="mb-4" aria-label="Filter classes">
    <div id="classes-filters-mount"></div>
  </section>

  <section class="classes-results" aria-live="polite">
    <div class="d-flex flex-wrap justify-content-between gap-2 align-items-center mb-3">
      <p id="classes-feedback" class="mb-0 text-danger d-none"></p>
      <p id="classes-results-meta" class="classes-results-meta mb-0 ms-auto"></p>
    </div>

    <div id="classes-grid" class="row g-3 g-md-4 classes-grid"></div>

    <div id="classes-empty" class="classes-empty rounded-4 p-4 p-md-5 text-center d-none">
      <h2 class="h4 mb-2">No classes found</h2>
      <p class="text-secondary mb-4">No workouts found for this criteria. Try clearing the filters.</p>
      <button id="classes-reset-btn" type="button" class="btn btn-primary px-4">Reset Filters</button>
    </div>
  </section>
</section>

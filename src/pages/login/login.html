<section class="login-page d-flex align-items-center justify-content-center">
  <div class="login-card w-100">
    <header class="mb-4">
      <h1 class="login-title mb-2">Welcome Back</h1>
      <p class="login-subtitle mb-0">Sign in to continue your SportSpot experience.</p>
    </header>

    <form id="login-form" novalidate>
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="login-email" placeholder="name@example.com" required autocomplete="email" />
        <label for="login-email">Email address</label>
      </div>

      <div class="form-floating mb-3">
        <input
          type="password"
          class="form-control"
          id="login-password"
          placeholder="Password"
          required
          minlength="6"
          autocomplete="current-password"
        />
        <label for="login-password">Password</label>
      </div>

      <div id="login-feedback" class="small text-danger mb-3" aria-live="polite"></div>

      <button type="submit" id="login-submit" class="btn btn-primary w-100 login-submit-btn" aria-live="polite">
        <span class="login-submit-label">Sign In</span>
      </button>
    </form>

    <p class="login-register-link text-center mb-0 mt-4">
      New here?
      <a href="/register" data-link>Create an account</a>
    </p>
  </div>
</section>

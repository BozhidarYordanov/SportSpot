<section class="profile-page rounded-5 p-3 p-md-4 p-xl-5">
  <header class="profile-glass-card rounded-4 p-4 p-md-5 mb-4">
    <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-4">
      <div class="d-flex align-items-center gap-3 gap-md-4">
        <div class="profile-avatar-wrap" id="profile-avatar-wrap">
          <img id="profile-avatar-image" class="profile-avatar-image d-none" alt="Profile avatar" />
          <div id="profile-avatar-fallback" class="profile-avatar-fallback" aria-hidden="true">
            <span id="profile-avatar-initials" class="profile-avatar-initials">U</span>
            <i id="profile-avatar-icon" class="bi bi-person profile-avatar-icon"></i>
          </div>
        </div>

        <div>
          <p class="profile-eyebrow mb-1">Account</p>
          <h1 class="profile-title mb-1">Your Profile</h1>
          <p class="profile-subtitle mb-0">Manage your account details and security settings.</p>
        </div>
      </div>

      <div>
        <input id="profile-photo-input" class="d-none" type="file" accept="image/*" />
        <button type="button" class="btn btn-outline-secondary profile-photo-btn" id="profile-change-photo-btn">Change Photo</button>
      </div>
    </div>
  </header>

  <div class="row g-4">
    <div class="col-12 col-xl-7">
      <section class="profile-glass-card rounded-4 p-4 p-md-5 h-100">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h2 class="h4 mb-0">Account Details</h2>
          <span class="profile-section-pill">Editable</span>
        </div>

        <form id="profile-details-form" novalidate>
          <div class="form-floating mb-3">
            <input id="profile-full-name" class="form-control" type="text" placeholder="Full Name" minlength="2" required autocomplete="name" />
            <label for="profile-full-name">Full Name</label>
          </div>

          <div class="form-floating mb-1 profile-email-field-wrap">
            <input
              id="profile-email"
              class="form-control profile-email-readonly"
              type="email"
              placeholder="name@example.com"
              required
              autocomplete="email"
              readonly
              title="Email is used for account identity and cannot be changed here."
            />
            <label for="profile-email">Email</label>
            <i class="bi bi-lock-fill profile-email-lock" aria-hidden="true"></i>
          </div>

          <p class="profile-email-help mb-3">Email is used for account identity and cannot be changed directly. Contact support for help.</p>

          <div class="form-floating mb-3">
            <input id="profile-phone" class="form-control" type="tel" placeholder="Phone" required autocomplete="tel" />
            <label for="profile-phone">Phone</label>
          </div>

          <button id="profile-details-submit" type="submit" class="btn btn-primary px-4" aria-live="polite">Save Changes</button>
        </form>
      </section>
    </div>

    <div class="col-12 col-xl-5">
      <section class="profile-glass-card rounded-4 p-4 p-md-5 h-100">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h2 class="h4 mb-0">Security</h2>
          <span class="profile-section-pill">Password</span>
        </div>

        <form id="profile-password-form" novalidate>
          <div class="form-floating mb-3">
            <input
              id="profile-new-password"
              class="form-control"
              type="password"
              placeholder="New Password"
              minlength="6"
              required
              autocomplete="new-password"
            />
            <label for="profile-new-password">New Password</label>
          </div>

          <div class="form-floating mb-3">
            <input
              id="profile-confirm-password"
              class="form-control"
              type="password"
              placeholder="Confirm Password"
              minlength="6"
              required
              autocomplete="new-password"
            />
            <label for="profile-confirm-password">Confirm Password</label>
          </div>

          <button id="profile-password-submit" type="submit" class="btn btn-primary px-4" aria-live="polite">Change Password</button>
        </form>
      </section>
    </div>
  </div>
</section>

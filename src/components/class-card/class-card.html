<div class="{{columnClass}}">
  {{linkStart}}
  <article class="class-card rounded-4 border h-100 p-3 p-md-4 bg-white">
    <div class="class-card-top">
      <p class="class-card-category text-uppercase small fw-semibold text-secondary mb-2">{{category}}</p>
      <h3 class="h5 mb-2">{{title}}</h3>
      <p class="class-card-meta text-secondary mb-0">{{meta}}</p>
    </div>
    {{difficultyBadge}}
    {{action}}
  </article>
  {{linkEnd}}
</div>

<div class="app-toast-host" data-app-toast-host>
  <div class="app-toast app-toast--info" role="status" aria-live="polite" aria-atomic="true" aria-hidden="true">
    <div class="app-toast__content">
      <span class="app-toast__icon" data-app-toast-icon aria-hidden="true">ℹ</span>
      <p class="app-toast__message" data-app-toast-message></p>
      <button type="button" class="app-toast__close" data-app-toast-close aria-label="Dismiss notification">×</button>
    </div>
    <span class="app-toast__progress" data-app-toast-progress></span>
  </div>
</div>
